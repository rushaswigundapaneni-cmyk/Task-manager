<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Task Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{

background:

linear-gradient(

-45deg,

#4facfe,

#8e44ad,

#00f2fe,

#3498db

);

background-size:

400% 400%;

animation:

move 10s ease infinite;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}


@keyframes move{

0%{

background-position:
0% 50%;

}

50%{

background-position:
100% 50%;

}

100%{

background-position:
0% 50%;

}

}
.container{

background:

rgba(
255,
255,
255,
0.15
);

backdrop-filter:

blur(
15px
);

border:

1px solid
rgba(
255,
255,
255,
0.3
);

}

.container{

width:480px;

max-width:1100px;

min-height:650px;

padding:40px;

transition:.4s;

overflow:hidden;

}
.form{

display:none;

}

input{

width:100%;

padding:12px;

margin-top:12px;

border-radius:10px;

border:1px solid #ccc;

}

.btn{

width:100%;

padding:12px;

margin-top:12px;

background:#007bff;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}

.btn:hover{

background:#0056b3;

}

.message{

margin-top:10px;

font-weight:bold;

}

.success{

color:green;

}

.error{

color:red;

}

.dashboard{

display:none;

margin-top:20px;

width:100%;

}
.sidebar{

width:220px;

background:#f4f7ff;

padding:20px;

border-radius:20px;

display:flex;

flex-direction:column;

gap:15px;

}

.sidebar div{

padding:15px;

border-radius:12px;

}

.sidebar div:hover{

background:#dce6ff;

}
.sidebar div{

padding:10px;

cursor:pointer;

}

.dashboard-body{

display:flex;

gap:20px;

}

.content{

flex:1;

}

.cards{

display:flex;

gap:10px;

}

.card{

height:130px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:20px;

border-radius:18px;

}
.blue{

background:#4f66ff;

}

.green{

background:#2ecc71;

}

.orange{

background:#f39c12;

}

.task{

background:white;

padding:18px;

border-radius:18px;

margin-top:15px;

box-shadow:
0 4px 15px
rgba(0,0,0,.08);

display:flex;

justify-content:space-between;

align-items:center;

}</style>

</head>

<body>

<div class="container">

<h1>
Welcome 👋
</h1>

<p>
Manage your tasks easily
</p>

<button
class="btn"
onclick="openRegister()">

Register

</button>

<button
class="btn"
onclick="openLogin()">

Login

</button>



<div
class="form"
id="registerBox">

<h2>
Register
</h2>

<input
id="name"
placeholder="Name">

<input
id="email"
placeholder="Email">

<input
type="password"
id="createPass"
placeholder="Password">

<button
class="btn"
onclick="registerUser()">

Create Account

</button>

<p
id="registerMsg"
class="message">

</p>

</div>



<div
class="form"
id="loginBox">

<h2>
Login
</h2>

<input
id="loginEmail"
placeholder="Email">

<input
type="password"
id="loginPass"
placeholder="Password">

<button
class="btn"
onclick="loginUser()">

Login

</button>

<p
id="loginMsg"
class="message">

</p>

</div>


<button
id="dashboardBtn"
class="btn"
style="display:none"
onclick="openDashboard()">

Welcome To Dashboard

</button>



<div
class="dashboard"
id="dashboard">
<div
style="
width:70px;
height:70px;
border-radius:50%;
background:#4f66ff;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto">

👤

</div>
<h2 id="dashUser">
</h2>

<div class="dashboard-body">

<div class="sidebar">

<div onclick="showAll()">
📝 My Tasks
</div>

<div onclick="showCompleted()">
✅ Completed
</div>

<div onclick="showPending()">
⏳ Pending
</div>

</div>



<div class="content">

<div class="cards">

<div class="card blue">

Total

<h2 id="totalTasks">
0
</h2>

</div>

<div class="card green">

Completed

<h2 id="completedTasks">
0
</h2>

</div>

<div class="card orange">

Pending

<h2 id="pendingTasks">
0
</h2>

</div>

</div>


<button
class="btn"
onclick="addTask()">

➕ Add Task

</button>

<div
id="taskContainer">

</div>


<button
class="btn"
onclick="logout()">

Logout

</button>

</div>

</div>

</div>

</div>



<script>

let storedUser={};

let tasks=[];


function openRegister(){

registerBox.style.display="block";

loginBox.style.display="none";

}


function openLogin(){

loginBox.style.display="block";

registerBox.style.display="none";

}


function registerUser(){

if(

storedUser.email

){

document
.getElementById(
"registerMsg"
)
.innerHTML=

"⚠ You already have an account";

document
.getElementById(
"registerMsg"
)
.className=

"message error";

return;

}


let userName=

document
.getElementById(
"name"
)
.value
.trim();

let userEmail=

document
.getElementById(
"email"
)
.value
.trim();

let userPass=

document
.getElementById(
"createPass"
)
.value
.trim();


if(

userName===""

||

userEmail===""

||

userPass===""

){

document
.getElementById(
"registerMsg"
)
.innerHTML=

"⚠ Please enter all details";

document
.getElementById(
"registerMsg"
)
.className=

"message error";

return;

}


storedUser={

name:userName,

email:userEmail,

password:userPass

};


document
.getElementById(
"registerMsg"
)
.innerHTML=

"✅ Registration Successful";

document
.getElementById(
"registerMsg"
)
.className=

"message success";


setTimeout(

function(){

openLogin();

},

1000

);

}function loginUser(){

if(

loginEmail.value.trim()===""

||

loginPass.value.trim()===""

){

loginMsg.innerHTML=

"⚠ Please enter Email and Password";

loginMsg.className=

"message error";

return;

}


if(

storedUser.email===undefined

){

loginMsg.innerHTML=

"⚠ Please Register First";

loginMsg.className=

"message error";

return;

}


if(

loginEmail.value===

storedUser.email

&&

loginPass.value===

storedUser.password

){

loginMsg.innerHTML=

"✅ Login Successful";

loginMsg.className=

"message success";

dashboardBtn.style.display=

"block";

}

else{

loginMsg.innerHTML=

"❌ Invalid Password";

loginMsg.className=

"message error";

}

}


function openDashboard(){

document
.querySelector(
"h1"
)
.style.display=
"none";

document
.querySelector(
"p"
)
.style.display=
"none";


registerBox
.style.display=
"none";

loginBox
.style.display=
"none";

dashboardBtn
.style.display=
"none";


document
.querySelector(
".container"
)
.style.width=
"1100px";


dashboard
.style.display=
"block";


dashUser.innerHTML=

"👋 Welcome "

+

storedUser.name;

}

function addTask(){

let task=

prompt(

"Enter Task"

);

if(!task)
return;

tasks.push({

name:task,

status:"Pending"

});

renderTasks();

}


function renderTasks(){

taskContainer.innerHTML="";

let completed=0;

tasks.forEach(

(t,i)=>{

if(
t.status===

"Completed"

)

completed++;

taskContainer.innerHTML+=`

<div class="task">

${t.name}

<br>

Status:
${t.status}

<button
onclick=

"completeTask(${i})">

✔

</button>

</div>

`;

}

);

totalTasks.innerHTML=

tasks.length;

completedTasks.innerHTML=

completed;

pendingTasks.innerHTML=

tasks.length

-

completed;

}


function completeTask(i){

tasks[i].status=

"Completed";

renderTasks();

}


function showCompleted(){

taskContainer.innerHTML="";

tasks

.filter(

t=>

t.status===

"Completed"

)

.forEach(

t=>{

taskContainer.innerHTML+=`

<div class="task">

${t.name}

<br>

Completed

</div>

`;

}

);

}


function showPending(){

taskContainer.innerHTML="";

tasks

.filter(

t=>

t.status===

"Pending"

)

.forEach(

t=>{

taskContainer.innerHTML+=`

<div class="task">

${t.name}

<br>

Pending

</div>

`;

}

);

}


function showAll(){

renderTasks();

}


function logout(){

dashboard.style.display=

"none";

dashboardBtn.style.display=

"none";

location.reload();

}

</script>

</body>

</html>
